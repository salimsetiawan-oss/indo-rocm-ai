# Training Arguments for Indonesian LLM Fine-Tuning
# Optimized for AMD Instinct GPUs via ROCm

training:
  output_dir: "./results/indo-llama3-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  # Effective batch size = 4 * 4 = 16

optimization:
  learning_rate: 2.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  warmup_steps: 100

precision:
  bf16: true                    # Use bfloat16 (supported on MI250/MI300)
  fp16: false                   # Don't use fp16 with bf16
  tf32: true                    # TF32 for matrix multiplications

memory_optimization:
  gradient_checkpointing: true  # Save VRAM at cost of ~30% speed
  optim: "paged_adamw_8bit"    # 8-bit optimizer for memory savings
  max_seq_length: 2048          # Reduce if VRAM limited

logging:
  logging_dir: "./results/logs"
  logging_steps: 10
  logging_first_step: true
  report_to: "tensorboard"

evaluation:
  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

data:
  dataset_path: "username/indo-instruction-v1"  # HuggingFace dataset
  max_train_samples: null       # Use all data
  max_eval_samples: 500
  preprocessing_num_workers: 4

hub:
  push_to_hub: true
  hub_model_id: "username/indo-llama3-lora"
  hub_strategy: "checkpoint"
